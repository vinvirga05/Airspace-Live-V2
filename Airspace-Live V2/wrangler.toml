# Airspace Live V2 — Cloudflare Pages config
# Used by Wrangler CLI for local dev and KV namespace binding.
#
# SETUP:
# 1. Run:  npx wrangler kv namespace create airspace-state
# 2. Copy the id it prints and paste it below as kv_namespace_id
# 3. Also run: npx wrangler kv namespace create airspace-state --preview
#    Paste that id as preview_id below
# 4. Commit and push — Cloudflare Pages will pick up the binding automatically
#
# OR skip the CLI and bind via Cloudflare Dashboard:
#   Workers & Pages → your project → Settings → Functions → KV namespace bindings
#   Variable name: AIRSPACE_STATE

name = "airspace-live-v2"
compatibility_date = "2024-01-01"
pages_build_output_dir = "."

[[kv_namespaces]]
binding  = "AIRSPACE_STATE"
id       = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_YOUR_PREVIEW_KV_NAMESPACE_ID"
